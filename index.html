<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Sphere | Official API Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff4d4d; --bg: #0a0a0c; --card: #16161a; }
        body { background: var(--bg); color: #e4e4e7; font-family: 'Inter', sans-serif; }
        .glass-nav { background: rgba(10, 10, 12, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .anime-card { background: var(--card); transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05); }
        .anime-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .btn-tab { padding: 8px 16px; border-radius: 99px; font-size: 14px; font-weight: 600; transition: 0.2s; cursor: pointer; opacity: 0.6; }
        .btn-tab.active { background: var(--accent); color: white; opacity: 1; }
        #player-modal { display: none; background: rgba(0,0,0,0.98); }
        .news-item { background: #16161a; border-radius: 16px; padding: 20px; border-left: 4px solid var(--accent); }
        .shimmer { background: linear-gradient(90deg, #16161a 25%, #2a2a30 50%, #16161a 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { to { background-position: -200% 0; } }
    </style>
</head>
<body class="antialiased">

    <nav class="fixed top-0 w-full z-50 glass-nav py-4 px-6 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="text-2xl font-black tracking-tighter text-white">ANIME<span class="text-red-500">SPHERE</span></div>
        <div class="flex gap-2">
            <div id="tab-main" class="btn-tab active" onclick="changeTab('main')">Главная</div>
            <div id="tab-top" class="btn-tab" onclick="changeTab('top')">Топ</div>
            <div id="tab-news" class="btn-tab" onclick="changeTab('news')">Новости</div>
        </div>
        <div class="relative w-full max-w-xs">
            <input id="search" type="text" placeholder="Поиск..." class="w-full bg-white/5 border border-white/10 rounded-full py-2 px-5 outline-none focus:ring-2 ring-red-500/50">
        </div>
    </nav>

    <main class="mt-32 px-6 max-w-7xl mx-auto pb-20">
        
        <section id="hero-wrap" class="mb-12">
            <div class="w-full p-8 rounded-3xl bg-gradient-to-br from-red-900/20 to-zinc-900 border border-white/5 flex flex-col md:flex-row gap-8 items-center">
                <div id="hero-img" class="w-40 h-40 rounded-2xl overflow-hidden shimmer flex-shrink-0"></div>
                <div class="text-center md:text-left flex-1">
                    <h3 id="hero-name" class="text-3xl font-black mb-2 italic">Загрузка персонажа...</h3>
                    <p id="hero-desc" class="text-zinc-400 text-sm line-clamp-2 mb-4"></p>
                    <button onclick="fetchRandomChar()" class="text-xs font-bold bg-white text-black px-4 py-2 rounded-full hover:bg-red-500 hover:text-white transition">СЛЕДУЮЩИЙ →</button>
                </div>
            </div>
        </section>

        <h2 id="section-title" class="text-xl font-bold mb-6 flex items-center gap-2">
            <span class="w-2 h-2 bg-red-500 rounded-full"></span> 
            Сейчас популярно
        </h2>

        <div id="content-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6">
            </div>
    </main>

    <div id="player-modal" class="fixed inset-0 z-[100] flex flex-col animate__animated animate__fadeIn">
        <div class="p-4 flex justify-between items-center glass-nav">
            <h4 id="player-title" class="font-bold truncate max-w-md"></h4>
            <button onclick="closePlayer()" class="bg-white/10 p-2 rounded-full hover:bg-red-500 transition">&times;</button>
        </div>
        <div class="flex-1 flex items-center justify-center p-4">
            <div class="w-full max-w-5xl aspect-video rounded-2xl overflow-hidden shadow-2xl bg-black border border-white/10">
                <iframe id="player-frame" src="" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; fullscreen"></iframe>
            </div>
        </div>
    </div>

    <script>
        const API_SHIKI = 'https://shikimori.one/api/animes';
        const API_JIKAN = 'https://api.jikan.moe/v4';
        const KODIK_TOKEN = '5e20ba06037267f551c6a282f300f83a'; // Публичный токен

        const grid = document.getElementById('content-grid');
        const search = document.getElementById('search');
        
        let currentTab = 'main';

        // 1. Смена вкладок
        function changeTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.btn-tab').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            document.getElementById('hero-wrap').style.display = (tab === 'main') ? 'flex' : 'none';
            grid.className = (tab === 'news') ? "flex flex-col gap-6" : "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6";

            if(tab === 'main') fetchAnime('order=popularity&status=ongoing', 'Сейчас популярно');
            if(tab === 'top') fetchAnime('order=ranked', 'Лучшее за всё время');
            if(tab === 'news') fetchNews();
        }

        // 2. Получение аниме (Shikimori)
        async function fetchAnime(params, title) {
            document.getElementById('section-title').innerHTML = `<span class="w-2 h-2 bg-red-500 rounded-full"></span> ${title}`;
            grid.innerHTML = Array(12).fill('<div class="aspect-[3/4] rounded-2xl shimmer"></div>').join('');
            
            try {
                const res = await fetch(`${API_SHIKI}?limit=24&${params}`);
                const data = await res.json();
                renderAnime(data);
            } catch (e) { grid.innerHTML = 'Ошибка загрузки данных.'; }
        }

        function renderAnime(data) {
            grid.innerHTML = data.map((a, i) => `
                <div class="anime-card rounded-2xl p-2 cursor-pointer animate__animated animate__fadeInUp" 
                     style="animation-delay: ${i*0.05}s" onclick="openPlayer(${a.id}, '${a.russian || a.name}')">
                    <div class="relative aspect-[3/4] rounded-xl overflow-hidden mb-3">
                        <img src="https://shikimori.one${a.image.original}" class="w-full h-full object-cover">
                        <div class="absolute top-2 right-2 bg-black/80 text-[10px] px-2 py-1 rounded font-bold border border-white/10">★ ${a.score}</div>
                    </div>
                    <div class="text-xs font-bold truncate px-1">${a.russian || a.name}</div>
                    <div class="text-[10px] text-zinc-500 px-1 mt-1">${a.kind.toUpperCase()} • ${a.episodes_aired || a.episodes || '?'} эп.</div>
                </div>
            `).join('');
        }

        // 3. Получение новостей (Jikan)
        async function fetchNews() {
            document.getElementById('section-title').innerText = 'Новости индустрии';
            grid.innerHTML = '<div class="w-full h-20 shimmer rounded-xl"></div>';
            try {
                const res = await fetch(`${API_JIKAN}/news`);
                const { data } = await res.json();
                grid.innerHTML = data.slice(0, 10).map(n => `
                    <div class="news-item animate__animated animate__fadeInLeft">
                        <div class="flex justify-between text-[10px] text-red-500 font-bold mb-2 uppercase">
                            <span>${n.author_username}</span>
                            <span>${new Date(n.date).toLocaleDateString()}</span>
                        </div>
                        <h3 class="text-lg font-bold mb-2">${n.title}</h3>
                        <p class="text-sm text-zinc-400 line-clamp-2">${n.excerpt}</p>
                        <a href="${n.url}" target="_blank" class="inline-block mt-4 text-xs font-bold border-b border-red-500">ЧИТАТЬ В ИСТОЧНИКЕ</a>
                    </div>
                `).join('');
            } catch (e) { grid.innerHTML = 'Не удалось загрузить новости.'; }
        }

        // 4. Рандомный персонаж
        async function fetchRandomChar() {
            try {
                const res = await fetch(`${API_JIKAN}/random/characters`);
                const { data } = await res.json();
                document.getElementById('hero-img').innerHTML = `<img src="${data.images.jpg.image_url}" class="w-full h-full object-cover animate__animated animate__fadeIn">`;
                document.getElementById('hero-name').innerText = data.name;
                document.getElementById('hero-desc').innerText = data.about || "Таинственный персонаж без описания...";
            } catch (e) {}
        }

        // 5. Плеер (Kodik API)
        async function openPlayer(shikiId, title) {
            const modal = document.getElementById('player-modal');
            const frame = document.getElementById('player-frame');
            document.getElementById('player-title').innerText = title;
            
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';

            try {
                const res = await fetch(`https://kodikapi.com/search?token=${KODIK_TOKEN}&shikimori_id=${shikiId}`);
                const json = await res.json();
                if(json.results && json.results.length > 0) {
                    let link = json.results[0].link;
                    frame.src = link.startsWith('//') ? 'https:' + link : link;
                } else {
                    frame.src = `https://shikivideos.github.io/embed.html#id=${shikiId}`;
                }
            } catch (e) {
                frame.src = `https://shikivideos.github.io/embed.html#id=${shikiId}`;
            }
        }

        function closePlayer() {
            document.getElementById('player-modal').style.display = 'none';
            document.getElementById('player-frame').src = '';
            document.body.style.overflow = 'auto';
        }

        // Поиск
        let timer;
        search.oninput = (e) => {
            clearTimeout(timer);
            timer = setTimeout(() => {
                if(e.target.value.length > 2) {
                    fetchAnime(`search=${encodeURIComponent(e.target.value)}`, `Результаты для: ${e.target.value}`);
                }
            }, 600);
        };

        // Инициализация
        changeTab('main');
        fetchRandomChar();
    </script>
</body>
</html>
